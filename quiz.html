<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QUIZ</title>

<style>
body{
  margin:0;
  background:#040712;
  color:#dffcff;
  font-family:'Pretendard',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel{
  width:600px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  margin-top:20px;
  background:#071021;
  border:1px solid #6ff6ff;
  color:white;
}

button{
  margin-top:20px;
  padding:14px 20px;
  background:#6ff6ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="panel">
  <h2>TYPE CODE 입력</h2>
  <input id="input" placeholder="예: IFAP" />
  <button onclick="submit()">ENTER</button>
</div>

<script>
function submit(){
  const val = document.getElementById('input').value.trim().toUpperCase();

  if(!val){
    alert("입력 필요");
    return;
  }

  localStorage.setItem('gruaType', val);

  // 👉 기존 유지: world로 이동
  location.href = "world.html";
}
</script>

</body>
</html>
