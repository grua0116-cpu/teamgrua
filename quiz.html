<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QUIZ</title>
</head>

<body>

<h2 id="question">로딩중</h2>
<input id="input">
<button onclick="submit()">제출</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
  authDomain: "teamgrua-2d9b9.firebaseapp.com",
  projectId: "teamgrua-2d9b9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const type = (params.get('type') || localStorage.getItem('gruaType') || '').toUpperCase();

const baseRef = db.collection("game")
.doc("season1")
.collection("rounds")
.doc("R0001")
.collection("slots");

let data = null;

async function load(){
  const doc = await baseRef.doc(type).get();
  data = doc.data();
  document.getElementById('question').textContent = data.question;
}

async function submit(){
  const val = document.getElementById('input').value.trim();

  if(data.answers.includes(val)){
    await baseRef.doc(type).update({ unlocked:true });
    location.href = "world.html";
  }else{
    alert("오답");
  }
}

load();
</script>

</body>
</html>
