<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WORLD</title>
</head>

<body>

<h1 id="percent">0%</h1>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
  authDomain: "teamgrua-2d9b9.firebaseapp.com",
  projectId: "teamgrua-2d9b9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const baseRef = db.collection("game")
.doc("season1")
.collection("rounds")
.doc("R0001")
.collection("slots");

async function load(){
  const snap = await baseRef.get();

  let total = 0;
  let unlocked = 0;

  snap.forEach(doc=>{
    total++;
    if(doc.data().unlocked) unlocked++;
  });

  document.getElementById('percent').textContent =
    Math.floor((unlocked/16)*100) + "%";

  // 👉 이거 하나만 추가된 상태
  if(unlocked === 16){
    location.href = "ending.html";
  }
}

load();
</script>

</body>
</html>
