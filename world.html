<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WORLD</title>

<style>
body{
  margin:0;
  background:#040712;
  color:#dffcff;
  font-family:'Pretendard',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel{
  width:700px;
  text-align:center;
}

.percent{
  font-size:60px;
  margin-bottom:20px;
}

.small{
  color:#9fc2cf;
}

button{
  margin-top:20px;
  padding:14px 24px;
  background:#6ff6ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="panel">

  <div class="percent" id="percent">0%</div>
  <div class="small">해금 상태 확인 중...</div>

</div>

<script>
// === Firebase 설정 (기존 그대로 사용하면 됨) ===
// 본인 config 쓰세요
const TOTAL = 16;

// 테스트용 (실제는 Firestore에서 가져오면 됨)
let slots = JSON.parse(localStorage.getItem("gruaSlots")) || [];

// 없으면 초기화
if(slots.length === 0){
  slots = Array.from({length:16}, () => ({unlocked:false}));
}

// 퍼센트 계산
function updateUI(){
  const unlocked = slots.filter(s => s.unlocked).length;
  const percent = Math.floor((unlocked / TOTAL) * 100);

  document.getElementById('percent').textContent = percent + "%";

  // ✅ 핵심 조건 (전체 해금)
  if(unlocked === TOTAL){
    goEnding();
  }
}

// 👉 연결만 추가
function goEnding(){
  setTimeout(() => {
    location.href = "ending.html";
  }, 800);
}

// 초기 실행
updateUI();

</script>

</body>
</html>
