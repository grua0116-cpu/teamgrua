<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WORLD</title>
</head>

<body style="background:black;color:#9efcff;text-align:center;padding-top:100px;">

<h1 id="percent">0%</h1>
<p>L-AFFECT PROJECT 진행률</p>

<div id="council" style="display:none; max-width:600px; margin:auto; line-height:1.8;">

당신은 CONTINUUM AUTHORITY의 평의회 입회 자격을 갖추었습니다.<br><br>

이제 당신은 L-AFFECT PROJECT의 마지막 평의만을 남겨두고 있습니다.<br>
당신은 어떤 사랑을 할 준비가 되어 있습니까?<br>
이 세계에서 발생한 사랑은 유지되어야 한다고 생각합니까?<br><br>

당신에게 발생한 사랑의 언어를 입력하면 평의에 참가하게 됩니다.<br><br>

<input placeholder="입력">

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "teamgrua-2d9b9.firebaseapp.com",
  projectId: "teamgrua-2d9b9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function load(){
  const snap=await db.collection("game").doc("season1")
  .collection("rounds").doc("R0001")
  .collection("slots").get();

  let t=0,d=0;
  snap.forEach(doc=>{
    t++;
    if(doc.data().unlocked) d++;
  });

  const p=Math.floor(d/t*100);
  document.getElementById("percent").innerText=p+"%";

  if(p===100){
    document.getElementById("council").style.display="block";
  }
}
load();
</script>

</body>
</html>
