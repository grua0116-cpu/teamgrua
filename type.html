<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TYPE INPUT</title>
<style>
:root{
  --bg-1:#040712;
  --bg-2:#071021;
  --bg-3:#02040b;
  --line:#6ff6ff;
  --line-soft:rgba(111,246,255,.38);
  --violet:#8d7cff;
  --text:#dffcff;
  --muted:#9fc2cf;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  color:var(--text);
  font-family: "Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(105,246,255,.14), transparent 32%),
    radial-gradient(circle at 80% 0%, rgba(141,124,255,.16), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(73,96,255,.10), transparent 36%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
  overflow-x:hidden;
}

.center-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.panel{
  width:min(92vw, 760px);
  padding:30px 26px;
  text-align:center;
  border:1px solid var(--line-soft);
  border-radius:22px;
  background:rgba(8,18,38,.72);
}

.title{
  font-size:14px;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:#bdfcff;
  margin-bottom:18px;
}

.big{
  font-size:clamp(24px, 4vw, 40px);
  margin-bottom:12px;
}

.muted{
  color:var(--muted);
}

input{
  width:100%;
  max-width:360px;
  margin-top:24px;
  padding:15px;
  text-align:center;
}

/* 🔥 여기만 변경된 부분 */
button{
  margin-top:18px;
  appearance:none;
  border:none;
  border-radius:18px;
  padding:16px 26px;
  min-width:200px;

  background:linear-gradient(90deg, rgba(111,246,255,.18), rgba(141,124,255,.22));
  color:var(--text);

  border:1px solid rgba(111,246,255,.65);
  cursor:pointer;

  font-weight:700;
  letter-spacing:.04em;

  box-shadow:
    0 0 0 1px rgba(111,246,255,.12) inset,
    0 0 14px rgba(111,246,255,.18),
    0 0 32px rgba(141,124,255,.12);

  backdrop-filter: blur(6px);
  transition: all .25s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:
    0 0 0 1px rgba(111,246,255,.18) inset,
    0 0 18px rgba(111,246,255,.28),
    0 0 40px rgba(141,124,255,.18);
  border-color:rgba(111,246,255,.9);
}

button:active{
  transform:translateY(0);
  box-shadow:
    0 0 10px rgba(111,246,255,.25) inset,
    0 0 12px rgba(111,246,255,.18);
}
/* 🔥 여기까지 */

.status{
  margin-top:14px;
}
</style>
</head>

<body>

<div class="center-screen">
  <div class="panel">
    <div class="title">CONTINUUM AUTHORITY // TYPE GATE</div>
    <h1 class="big">당신의 궤도를 입력하십시오</h1>
    <p class="muted">당신의 포지션 타입을 입력하면 해당 질문 구역으로 이동합니다.</p>

    <input id="typeInput" placeholder="예: IFAP" maxlength="4" />
    <button onclick="goType()">입장</button>

    <div class="status" id="status"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
  authDomain: "teamgrua-2d9b9.firebaseapp.com",
  projectId: "teamgrua-2d9b9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const baseRef = db.collection("game")
  .doc("season1")
  .collection("rounds")
  .doc("R0001")
  .collection("slots");

async function isWorldUnlocked(){
  const snap = await baseRef.get();
  let unlocked = 0;

  snap.forEach(doc=>{
    if(doc.data().unlocked) unlocked++;
  });

  return unlocked >= 16;
}

async function goType(){
  const type = document.getElementById('typeInput').value.trim().toUpperCase();
  const status = document.getElementById('status');

  if(!type){
    status.textContent = '타입을 입력하십시오.';
    return;
  }

  localStorage.setItem('gruaType', type);
  status.textContent = '확인 중...';

  try{
    const open = await isWorldUnlocked();

    if(open){
      location.href = 'world.html';
      return;
    }

  }catch(e){
    console.error(e);
    status.textContent = '데이터 확인 실패';
    return;
  }

  location.href = 'quiz.html?type=' + encodeURIComponent(type);
}

document.getElementById('typeInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') goType();
});
</script>

</body>
</html>
