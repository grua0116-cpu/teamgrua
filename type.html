<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TYPE INPUT</title>
<style>
:root{
  --bg-1:#040712;
  --bg-2:#071021;
  --bg-3:#02040b;
  --line:#6ff6ff;
  --line-soft:rgba(111,246,255,.38);
  --violet:#8d7cff;
  --text:#dffcff;
  --muted:#9fc2cf;
  --panel:rgba(7,16,33,.56);
  --panel-2:rgba(6,12,24,.72);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  color:var(--text);
  font-family: "Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(105,246,255,.14), transparent 32%),
    radial-gradient(circle at 80% 0%, rgba(141,124,255,.16), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(73,96,255,.10), transparent 36%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 5% 12%, rgba(255,255,255,.88) 42%, transparent 45%),
    radial-gradient(1px 1px at 9% 31%, rgba(255,255,255,.54) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 14% 54%, rgba(105,246,255,.62) 42%, transparent 45%),
    radial-gradient(2px 2px at 18% 77%, rgba(255,255,255,.74) 42%, transparent 45%),
    radial-gradient(1px 1px at 23% 20%, rgba(255,255,255,.44) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 27% 42%, rgba(141,124,255,.60) 42%, transparent 45%),
    radial-gradient(2px 2px at 32% 63%, rgba(255,255,255,.72) 42%, transparent 45%),
    radial-gradient(1px 1px at 36% 85%, rgba(255,255,255,.42) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 41% 14%, rgba(105,246,255,.68) 42%, transparent 45%),
    radial-gradient(2px 2px at 46% 36%, rgba(255,255,255,.78) 42%, transparent 45%),
    radial-gradient(1px 1px at 51% 57%, rgba(255,255,255,.46) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 56% 79%, rgba(141,124,255,.58) 42%, transparent 45%),
    radial-gradient(2px 2px at 61% 24%, rgba(105,246,255,.64) 42%, transparent 45%),
    radial-gradient(1px 1px at 66% 46%, rgba(255,255,255,.48) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 71% 68%, rgba(255,255,255,.58) 42%, transparent 45%),
    radial-gradient(2px 2px at 76% 88%, rgba(105,246,255,.60) 42%, transparent 45%),
    radial-gradient(1px 1px at 81% 19%, rgba(255,255,255,.42) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 85% 39%, rgba(255,255,255,.56) 42%, transparent 45%),
    radial-gradient(2px 2px at 90% 61%, rgba(141,124,255,.60) 42%, transparent 45%),
    radial-gradient(1px 1px at 94% 83%, rgba(255,255,255,.48) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 97% 27%, rgba(105,246,255,.62) 42%, transparent 45%),
    radial-gradient(1px 1px at 11% 92%, rgba(255,255,255,.50) 42%, transparent 45%),
    radial-gradient(1px 1px at 28% 8%, rgba(255,255,255,.50) 42%, transparent 45%),
    radial-gradient(1px 1px at 44% 91%, rgba(255,255,255,.44) 42%, transparent 45%),
    radial-gradient(1px 1px at 63% 6%, rgba(255,255,255,.42) 42%, transparent 45%),
    radial-gradient(1px 1px at 74% 11%, rgba(255,255,255,.46) 42%, transparent 45%);
  opacity:.98;
  animation: starsFloat 18s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(111,246,255,.06), transparent 40%),
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:auto, 36px 36px, 36px 36px;
  opacity:.22;
  mask-image: radial-gradient(circle at center, rgba(0,0,0,1), rgba(0,0,0,.18));
}

@keyframes starsFloat{
  from { transform: translateY(0px); }
  50% { transform: translateY(6px); }
  to { transform: translateY(0px); }
}

.wrap{
  width:min(92vw, 980px);
  margin:0 auto;
  position:relative;
  z-index:2;
}

.center-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 0;
}

.panel{
  width:min(92vw, 760px);
  background:linear-gradient(180deg, rgba(8,18,38,.72), rgba(4,10,21,.76));
  border:1px solid var(--line-soft);
  border-radius:22px;
  box-shadow:
    0 0 0 1px rgba(111,246,255,.08) inset,
    0 0 28px rgba(111,246,255,.08),
    0 0 64px rgba(141,124,255,.08);
  backdrop-filter: blur(14px);
  padding:30px 26px;
}

.title{
  font-size:14px;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:#bdfcff;
  opacity:.78;
  margin-bottom:18px;
}

.big{
  font-size:clamp(24px, 4vw, 40px);
  font-weight:700;
  line-height:1.15;
  margin:0 0 12px;
}

.muted{
  color:var(--muted);
  line-height:1.8;
}

input, textarea{
  width:100%;
  border-radius:16px;
  border:1px solid rgba(111,246,255,.45);
  background:rgba(5,11,23,.72);
  color:var(--text);
  padding:15px 16px;
  outline:none;
  font-size:16px;
  box-shadow:
    0 0 0 1px rgba(111,246,255,.06) inset,
    0 0 16px rgba(111,246,255,.08);
}

input::placeholder, textarea::placeholder{
  color:rgba(223,252,255,.42);
}

input:focus, textarea:focus{
  border-color:rgba(111,246,255,.82);
  box-shadow:
    0 0 0 1px rgba(111,246,255,.14) inset,
    0 0 6px #00eaff,
    0 0 18px rgba(0,234,255,.42),
    0 0 36px rgba(141,124,255,.16);
}

button{
  appearance:none;
  border:none;
  border-radius:16px;
  padding:14px 20px;
  min-width:180px;
  background:linear-gradient(90deg, rgba(111,246,255,.16), rgba(141,124,255,.18));
  color:var(--text);
  border:1px solid rgba(111,246,255,.5);
  cursor:pointer;
  font-weight:700;
  letter-spacing:.02em;
  box-shadow:0 0 18px rgba(111,246,255,.12);
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 0 28px rgba(111,246,255,.18);
}

.row{display:flex; gap:12px; flex-wrap:wrap; justify-content:center}
.center{text-align:center}
.hide{display:none}

.percent{
  font-size:clamp(36px, 8vw, 72px);
  font-weight:800;
  color:#c9ffff;
  text-shadow:0 0 10px rgba(111,246,255,.42), 0 0 26px rgba(111,246,255,.22);
  margin:0;
}

.progress-shell{
  margin:14px auto 10px;
  width:min(560px, 100%);
  height:14px;
  border-radius:999px;
  border:1px solid rgba(111,246,255,.3);
  background:rgba(2,6,14,.72);
  overflow:hidden;
  box-shadow:inset 0 0 18px rgba(111,246,255,.06);
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg, #6ff6ff, #8d7cff);
  box-shadow:0 0 18px rgba(111,246,255,.38);
  transition:width .35s ease;
}

.status{
  min-height:24px;
  margin-top:14px;
  color:#c9eff6;
  font-size:14px;
}

.small{
  font-size:13px;
  color:var(--muted);
}

@media (max-width:640px){
  .panel{padding:24px 18px;border-radius:18px}
  .title{font-size:12px}
  input,textarea{font-size:15px}
}
</style>
</head>
<body>
<div class="center-screen">
  <div class="panel center">
    <div class="title">CONTINUUM AUTHORITY // TYPE GATE</div>
    <h1 class="big">당신의 궤도를 입력하십시오</h1>
    <p class="muted">당신의 포지션 타입을 입력하면 해당 질문 구역으로 이동합니다.</p>
    <div style="margin-top:24px;">
      <input id="typeInput" placeholder="예: IFAP" maxlength="4" style="max-width:360px; text-align:center; text-transform:uppercase;" />
    </div>
    <div class="row" style="margin-top:18px;">
      <button onclick="goType()">입장</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
function goType() {
  const el = document.getElementById('typeInput');
  const type = el.value.trim().toUpperCase();
  if (!type) {
    document.getElementById('status').textContent = '타입을 입력하십시오.';
    return;
  }
  localStorage.setItem('gruaType', type);
  location.href = 'quiz.html?type=' + encodeURIComponent(type);
}

document.getElementById('typeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') goType();
});
</script>
</body>
</html>
