<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TYPE INPUT</title>
</head>

<body>

<input id="typeInput" placeholder="예: IFAP" />
<button onclick="goType()">입장</button>
<div id="status"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
  authDomain: "teamgrua-2d9b9.firebaseapp.com",
  projectId: "teamgrua-2d9b9"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

const baseRef = db.collection("game")
  .doc("season1")
  .collection("rounds")
  .doc("R0001")
  .collection("slots");

// ✅ 추가된 함수
async function isWorldUnlocked() {
  const snap = await baseRef.get();

  let unlocked = 0;
  snap.forEach(doc => {
    const data = doc.data() || {};
    if (data.unlocked === true) unlocked++;
  });

  return unlocked === 16;
}

// 🔥 기존 함수 유지 + 앞단 체크만 추가
async function goType() {
  const el = document.getElementById('typeInput');
  const type = el.value.trim().toUpperCase();

  if (!type) {
    document.getElementById('status').textContent = '타입을 입력하십시오.';
    return;
  }

  localStorage.setItem('gruaType', type);

  document.getElementById('status').textContent = '확인 중입니다...';

  try {
    const worldOpen = await isWorldUnlocked();

    if (worldOpen) {
      location.href = 'world.html';
      return;
    }

  } catch (e) {
    console.error(e);
  }

  // 👉 기존 흐름 그대로 유지
  location.href = 'quiz.html?type=' + encodeURIComponent(type);
}

document.getElementById('typeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') goType();
});
</script>

</body>
</html>
