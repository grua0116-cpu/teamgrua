<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRUA Admin</title>
  <style>
    body { margin:0; background:#0b0b0b; color:#e6e6e6; font-family:sans-serif; }
    .wrap { max-width:720px; margin:0 auto; padding:36px 18px; }
    .box,.post { border:1px solid #333; background:#111; padding:18px; margin-bottom:18px; }
    textarea,input { width:100%; box-sizing:border-box; background:#070707; color:#eee; border:1px solid #333; padding:12px; margin-bottom:10px; }
    textarea { min-height:120px; }
    button { background:#e6e6e6; color:#111; border:0; padding:12px; font-weight:700; cursor:pointer; }
    .full { width:100%; }
    .hidden { display:none; }
    .meta { color:#888; font-size:13px; margin-bottom:10px; }
    .content { white-space:pre-wrap; line-height:1.7; }
    .comment { font-size:14px; color:#ccc; border-bottom:1px solid #222; padding:8px 0; }
    .comment-form { display:flex; gap:8px; margin-top:10px; }
    .comment-form input { margin-bottom:0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>GRUA 관리자</h1>

    <div class="box">
      <div id="status" class="meta">관리자 로그인이 필요합니다.</div>
      <button id="loginBtn">Google 로그인</button>
      <button id="logoutBtn" class="hidden">로그아웃</button>
    </div>

    <div id="adminArea" class="hidden">
      <div class="box">
        <textarea id="postContent" placeholder="새 글 작성"></textarea>
        <button id="submitPost" class="full">글 등록</button>
      </div>

      <div id="posts"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
      authDomain: "teamgrua-2d9b9.firebaseapp.com",
      projectId: "teamgrua-2d9b9",
      storageBucket: "teamgrua-2d9b9.firebasestorage.app",
      messagingSenderId: "195186066793",
      appId: "1:195186066793:web:14eb2976f5f1b7304c69f8"
    };

    const ADMIN_EMAIL = "marchpeach2023@gmail.com";
    const BOARD_COLLECTION = "posts2027";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const status = document.getElementById("status");
    const adminArea = document.getElementById("adminArea");
    const postContent = document.getElementById("postContent");
    const submitPost = document.getElementById("submitPost");
    const postsEl = document.getElementById("posts");

    let isAdmin = false;

    loginBtn.onclick = () => signInWithPopup(auth, provider);
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
      isAdmin = user && user.email === ADMIN_EMAIL;

      if (isAdmin) {
        status.textContent = `관리자 로그인 중: ${user.email}`;
        loginBtn.classList.add("hidden");
        logoutBtn.classList.remove("hidden");
        adminArea.classList.remove("hidden");
        await loadPosts();
      } else {
        status.textContent = "관리자 로그인이 필요합니다.";
        loginBtn.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
        adminArea.classList.add("hidden");
      }
    });

    submitPost.onclick = async () => {
      const content = postContent.value.trim();
      if (!content) return alert("내용을 입력해주세요.");

      await addDoc(collection(db, BOARD_COLLECTION), {
        content,
        createdAt: serverTimestamp()
      });

      postContent.value = "";
      await loadPosts();
    };

    async function loadPosts() {
      postsEl.innerHTML = "";

      const q = query(
        collection(db, BOARD_COLLECTION),
        orderBy("createdAt", "desc"),
        limit(50)
      );

      const snapshot = await getDocs(q);

      for (const docSnap of snapshot.docs) {
        const post = docSnap.data();
        const postId = docSnap.id;

        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <div class="meta">익명</div>
          <div class="content">${escapeHtml(post.content)}</div>
          <div id="comments-${postId}"></div>
          <div class="comment-form">
            <input id="comment-input-${postId}" placeholder="댓글 작성" />
            <button data-id="${postId}">댓글</button>
          </div>
        `;

        postsEl.appendChild(div);
        await loadComments(postId);

        div.querySelector("button").onclick = async (e) => {
          const id = e.target.dataset.id;
          const input = document.getElementById(`comment-input-${id}`);
          const text = input.value.trim();
          if (!text) return;

          await addDoc(collection(db, BOARD_COLLECTION, id, "comments"), {
            content: text,
            createdAt: serverTimestamp()
          });

          input.value = "";
          await loadComments(id);
        };
      }
    }

    async function loadComments(postId) {
      const box = document.getElementById(`comments-${postId}`);
      const q = query(
        collection(db, BOARD_COLLECTION, postId, "comments"),
        orderBy("createdAt", "asc"),
        limit(30)
      );

      const snapshot = await getDocs(q);
      box.innerHTML = `<div class="meta">댓글 ${snapshot.size}</div>`;

      snapshot.forEach((docSnap) => {
        const comment = docSnap.data();
        const div = document.createElement("div");
        div.className = "comment";
        div.textContent = `익명: ${comment.content}`;
        box.appendChild(div);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
