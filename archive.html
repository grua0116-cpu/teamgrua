<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVE</title>
<style>
:root{
  --bg-1:#040712;
  --bg-2:#071021;
  --bg-3:#02040b;
  --line:#6ff6ff;
  --line-soft:rgba(111,246,255,.26);
  --text:#dffcff;
  --muted:#9fc2cf;
  --violet:#8d7cff;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  color:var(--text);
  font-family:"Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(105,246,255,.12), transparent 32%),
    radial-gradient(circle at 80% 0%, rgba(141,124,255,.12), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(73,96,255,.08), transparent 36%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
  overflow-x:hidden;
  opacity:0;
  transition:opacity 1.1s ease;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 5% 12%, rgba(255,255,255,.84) 42%, transparent 45%),
    radial-gradient(1px 1px at 9% 31%, rgba(255,255,255,.54) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 14% 54%, rgba(105,246,255,.62) 42%, transparent 45%),
    radial-gradient(2px 2px at 18% 77%, rgba(255,255,255,.72) 42%, transparent 45%),
    radial-gradient(1px 1px at 23% 20%, rgba(255,255,255,.40) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 27% 42%, rgba(141,124,255,.54) 42%, transparent 45%),
    radial-gradient(2px 2px at 32% 63%, rgba(255,255,255,.68) 42%, transparent 45%),
    radial-gradient(1px 1px at 36% 85%, rgba(255,255,255,.36) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 41% 14%, rgba(105,246,255,.64) 42%, transparent 45%),
    radial-gradient(2px 2px at 46% 36%, rgba(255,255,255,.72) 42%, transparent 45%),
    radial-gradient(1px 1px at 51% 57%, rgba(255,255,255,.42) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 56% 79%, rgba(141,124,255,.48) 42%, transparent 45%),
    radial-gradient(2px 2px at 61% 24%, rgba(105,246,255,.60) 42%, transparent 45%),
    radial-gradient(1px 1px at 66% 46%, rgba(255,255,255,.40) 42%, transparent 45%),
    radial-gradient(1.5px 1.5px at 71% 68%, rgba(255,255,255,.52) 42%, transparent 45%),
    radial-gradient(2px 2px at 76% 88%, rgba(105,246,255,.56) 42%, transparent 45%);
  opacity:.9;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(111,246,255,.05), transparent 40%),
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
  background-size:auto, 36px 36px, 36px 36px;
  opacity:.18;
  mask-image: radial-gradient(circle at center, rgba(0,0,0,1), rgba(0,0,0,.18));
}

.wrap{
  width:min(94vw, 1120px);
  margin:0 auto;
  padding:48px 0 72px;
  position:relative;
  z-index:2;
}

.hero{
  margin:0 auto 24px;
  padding:22px 20px 18px;
  border:1px solid var(--line-soft);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(8,18,38,.72), rgba(4,10,21,.76));
  box-shadow:
    0 0 0 1px rgba(111,246,255,.06) inset,
    0 0 28px rgba(111,246,255,.08),
    0 0 56px rgba(141,124,255,.06);
  backdrop-filter:blur(14px);
}

.eyebrow{
  font-size:12px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:#bdfcff;
  opacity:.78;
  margin-bottom:12px;
}

.hero h1{
  margin:0 0 10px;
  font-size:clamp(28px, 5vw, 50px);
  line-height:1.08;
  letter-spacing:.04em;
}

.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.85;
}

.section{
  border:1px solid var(--line-soft);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(8,18,38,.68), rgba(4,10,21,.74));
  box-shadow:
    0 0 0 1px rgba(111,246,255,.05) inset,
    0 0 22px rgba(111,246,255,.05);
  backdrop-filter:blur(12px);
  overflow:hidden;
}

.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:16px 18px;
  border-bottom:1px solid rgba(111,246,255,.14);
  background:linear-gradient(90deg, rgba(111,246,255,.06), rgba(141,124,255,.04));
}

.section-title{
  font-size:13px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:#bdfcff;
  opacity:.88;
}

.section-index{
  font-size:12px;
  color:#7edee8;
  opacity:.78;
}

.section-body{
  padding:20px 18px 22px;
}

.notice{
  padding:16px;
  border:1px solid rgba(111,246,255,.12);
  border-radius:16px;
  background:rgba(5,11,23,.32);
  color:var(--muted);
  line-height:1.9;
}

.notice strong{
  color:var(--text);
}

.cards{
  margin-top:16px;
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:14px;
}

.card{
  border:1px solid rgba(111,246,255,.14);
  border-radius:18px;
  background:rgba(5,11,23,.30);
  overflow:hidden;
  box-shadow:0 0 18px rgba(111,246,255,.05);
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 0 26px rgba(111,246,255,.12);
  border-color:rgba(111,246,255,.3);
}

.card-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-bottom:1px solid rgba(111,246,255,.10);
  background:rgba(111,246,255,.04);
}

.card-code{
  font-size:12px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#aaf7ff;
}

.card-state{
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#89edf6;
  opacity:.84;
}

.card-body{
  padding:14px;
}

.card-title{
  margin:0 0 8px;
  font-size:18px;
  line-height:1.4;
}

.card-desc{
  margin:0;
  color:var(--muted);
  line-height:1.8;
  min-height:56px;
}

.card-actions{
  padding:0 14px 14px;
}

.button{
  appearance:none;
  border:none;
  border-radius:14px;
  padding:12px 16px;
  width:100%;
  background:linear-gradient(90deg, rgba(111,246,255,.16), rgba(141,124,255,.18));
  color:var(--text);
  border:1px solid rgba(111,246,255,.5);
  cursor:pointer;
  font-weight:700;
  letter-spacing:.04em;
  box-shadow:0 0 18px rgba(111,246,255,.12);
}

.button:hover{
  box-shadow:0 0 28px rgba(111,246,255,.18);
}

.footer-actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:18px;
}

.secondary{
  background:rgba(5,11,23,.6);
}

.status{
  min-height:24px;
  margin-top:12px;
  color:#c9eff6;
  font-size:14px;
}

.fade{
  position:fixed;
  inset:0;
  background:#02040b;
  opacity:0;
  pointer-events:none;
  transition:opacity .9s ease;
  z-index:10;
}
.fade.show{ opacity:1; }

@media (max-width:840px){
  .cards{
    grid-template-columns:1fr;
  }
}

@media (max-width:640px){
  .wrap{ padding:24px 0 56px; }
  .hero, .section-body{ padding-left:14px; padding-right:14px; }
  .section-head{ padding-left:14px; padding-right:14px; }
  .hero h1{ font-size:30px; }
}
</style>
</head>
<body>
<div class="wrap">

  <section class="hero">
    <div class="eyebrow">GRUA Archive // Limited Release</div>
    <h1>후속 연구 보관 자료</h1>
    <p id="heroText">후속 연구 동의가 확인되었습니다. 일부 보존 자료에 대한 제한적 열람 권한이 부여됩니다.</p>
  </section>

  <section class="section">
    <div class="section-head">
      <div class="section-title">Archive Access</div>
      <div class="section-index">05</div>
    </div>
    <div class="section-body">
      <div class="notice">
        <strong>열람 안내</strong><br>
        본 자료는 전체 보관 목록 16개 중 일부만 무작위 개방된 상태입니다.<br>
        각 항목은 후속 연구를 위한 참고 기록이며, 접근 가능한 자료는 열람 시점마다 달라질 수 있습니다.
      </div>

      <div id="cards" class="cards"></div>

      <div class="footer-actions">
        <button id="creditsBtn" class="button secondary" type="button">ENDING SCROLL</button>
      </div>
      <div id="status" class="status"></div>
    </div>
  </section>

</div>

<div id="fade" class="fade"></div>

<script>
window.addEventListener('load', () => {
  document.body.style.opacity = '1';

  const consent = localStorage.getItem('gruaConsent');
  if (consent) {
    document.getElementById('heroText').textContent =
      '후속 연구 동의가 확인되었습니다. 기록된 사랑의 언어: "' + consent + '"';
  }

  renderRandomCards();
});

const archivePool = [
  {
    code: "ARC-01",
    state: "LIMITED",
    title: "기록 샘플 01",
    desc: "여기에 1번 작품 설명을 넣으시면 됩니다.",
    link: "#"
  },
  {
    code: "ARC-02",
    state: "LIMITED",
    title: "기록 샘플 02",

    link: "#"
  },
  {
    code: "ARC-03",

    title: "기록 샘플 03",
    desc: "여기에 3번 작품 설명을 넣으시면 됩니다.",
    link: "#"
  },
  {

    state: "LIMITED",
    title: "기록 샘플 04",

  {

    state: "LIMITED",

    desc: "여기에 7번 작품 설명을 넣으시면 됩니다.",
    link: "#"
  },
  {
    code: "ARC-08",
    state: "LIMITED",

    desc: "여기에 16번 작품 설명을 넣으시면 됩니다.",
    link: "#"
  }
];

function renderRandomCards() {
  const cardsEl = document.getElementById('cards');
  const picked = shuffle([...archivePool]).slice(0, 4);

  cardsEl.innerHTML = picked.map(item => `
    <article class="card">
      <div class="card-head">
        <div class="card-code mono">${item.code}</div>
        <div class="card-state mono">${item.state}</div>
      </div>
      <div class="card-body">
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        <p class="card-desc">${escapeHtml(item.desc)}</p>
      </div>
      <div class="card-actions">
        <button class="button" type="button" onclick="openArchiveLink('${encodeURIComponent(item.link)}')">OPEN RECORD</button>
      </div>
    </article>
  `).join('');
}

function openArchiveLink(encodedLink) {
  const link = decodeURIComponent(encodedLink);
  if (!link || link === '#') {
    document.getElementById('status').textContent = '아직 연결되지 않은 기록입니다. 링크를 입력해 주세요.';
    return;
  }
  window.open(link, '_blank');
}

document.getElementById('creditsBtn').addEventListener('click', async () => {
  document.getElementById('status').textContent = '엔딩 스크롤로 이동 중...';
  document.getElementById('fade').classList.add('show');
  await wait(1000);
  location.href = 'credits.html';
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}
</script>

</html>
