<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ENDING</title>

<style>
:root{
  --bg-1:#040712;
  --bg-2:#071021;
  --bg-3:#02040b;
  --line:#6ff6ff;
  --text:#dffcff;
  --muted:#9fc2cf;
}

body{
  margin:0;
  color:var(--text);
  font-family:"Pretendard","Noto Sans KR",sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(105,246,255,.14), transparent 32%),
    linear-gradient(180deg, var(--bg-1), var(--bg-2));
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  opacity:0;
  transition:opacity 1s ease;
}

.panel{
  width:720px;
  background:rgba(5,10,22,.85);
  border:1px solid rgba(111,246,255,.3);
  border-radius:20px;
  padding:30px;
  text-align:center;
}

.title{
  font-size:13px;
  letter-spacing:.3em;
  color:#9fefff;
}

.big{
  font-size:40px;
  margin:20px 0;
}

.text{
  color:var(--muted);
  line-height:1.9;
}

.line{
  height:1px;
  background:rgba(111,246,255,.3);
  margin:25px 0;
}

/* 카드 */
.id-card{
  display:flex;
  justify-content:space-between;
  border:1px solid rgba(111,246,255,.4);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  background:rgba(5,11,23,.5);
}

.id-left{
  text-align:left;
}

.id-block span{
  font-size:11px;
  color:#6fcad3;
}

.id-block p{
  margin:4px 0 0;
  font-size:16px;
}

.id-right{
  text-align:center;
}

.id-type{
  font-size:20px;
  font-weight:700;
}

.small{
  font-size:12px;
  color:#7ddcff;
  margin-top:6px;
}

button{
  margin-top:20px;
  padding:12px 20px;
  background:#6ff6ff;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.status-log{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="panel">

<div class="title">CONTINUUM AUTHORITY / DIRECTIVE COUNCIL</div>

<h1 class="big">ACCESS GRANTED</h1>

<div class="text">
모든 조각이 회수되었습니다.<br>
정상 궤도로 편입을 시도합니다.
</div>

<div class="line"></div>

<div class="text">
당신은 해당 기록의 전부를 열람한 뒤<br>
평의회원으로써 역할과 기능을 다할 수 있습니다.<br>
우리 세계의 진실을 확인하시겠습니까?
</div>

<div class="id-card">

  <div class="id-left">

    <div class="id-block">
      <span>ID</span>
      <p id="idText">-</p>
    </div>

    <div class="id-block">
      <span>STATUS</span>
      <p id="statusText">-</p>
    </div>

    <div class="id-block">
      <span>ISSUED</span>
      <p id="timeText">-</p>
    </div>

    <div class="id-block">
      <span>SERIAL</span>
      <p id="serialText">-</p>
    </div>

  </div>

  <div class="id-right">
    <div class="id-type" id="typeText">----</div>
    <div class="small">TYPE CODE</div>
  </div>

</div>

<button id="btn">PROCEED</button>
<div class="status-log" id="log"></div>

</div>

<script>
window.onload = () => {
  document.body.style.opacity = 1;

  const type = localStorage.getItem('gruaType') || "UNKN";

  const numbers = ["0116","1219","0428","0825"];
  const rand = numbers[Math.floor(Math.random() * numbers.length)];

  const id = type + "-" + rand;

  document.getElementById('idText').textContent = id;
  document.getElementById('typeText').textContent = type;
  document.getElementById('statusText').textContent =
    type + " / COUNCIL MEMBER";

  const now = new Date();
  document.getElementById('timeText').textContent =
    now.toLocaleString();

  document.getElementById('serialText').textContent =
    "CA-" + rand + "-" + Math.floor(Math.random()*9000+1000);
};

const btn = document.getElementById('btn');
const log = document.getElementById('log');

btn.onclick = async () => {
  btn.disabled = true;

  log.textContent = "기록 확인 중...";
  await wait(700);

  log.textContent = "평의회 승인 로그 갱신 중...";
  await wait(900);

  log.textContent = "확인 완료";
  await wait(600);

  document.body.style.opacity = 0;
  await wait(1000);

  location.href = "index.html";
};

function wait(ms){
  return new Promise(r => setTimeout(r, ms));
}
</script>

</body>
</html>
