<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRUA CAMPUS MAP</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f4eddc;
      --paper: #f6f0e4;
      --brown: #6f4a2d;
      --red: #9f1d16;
      --red-dark: #7f140f;
      --green: #1f7a45;
      --line: #d7c8b4;
      --text: #4b3d31;
      --white: #ffffff;
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      font-family: "Georgia", "Apple SD Gothic Neo", "Noto Sans KR", serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .intro {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .intro-card {
      width: min(680px, 100%);
      background: rgba(255,255,255,0.45);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    .intro-title {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.03em;
    }

    .intro-sub {
      margin: 0 0 28px;
      font-size: 16px;
      line-height: 1.7;
      color: #6a5748;
    }

    .start-btn,
    .submit-btn,
    .hint-btn {
      border: none;
      color: var(--white);
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }

    .start-btn,
    .submit-btn {
      background: var(--red);
    }

    .hint-btn {
      background: #7b6858;
    }

    .start-btn:hover,
    .submit-btn:hover,
    .hint-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .hidden {
      display: none !important;
    }

    .main {
      width: 100%;
      padding: 28px 16px 60px;
    }

    .main-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .page-title {
      text-align: center;
      color: var(--red);
      margin: 0 0 20px;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .map-wrap {
      position: relative;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .map-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      border-radius: 20px;
    }

    .node-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .node {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.95);
      background: rgba(70, 70, 70, 0.72);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 6px 14px rgba(0,0,0,0.18);
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }

    .node:hover {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .node.active {
      background: var(--red);
    }

    .node.done {
      background: var(--green);
    }

    .layout-grid {
      width: min(1100px, 100%);
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 16px;
      align-items: start;
    }

    .left-stack {
      display: grid;
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,0.5);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 14px;
      color: var(--red);
      font-size: 22px;
    }

    .selected-box {
      min-height: 110px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
    }

    .selected-code {
      font-size: 36px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }

    .selected-name {
      font-size: 20px;
      font-weight: 700;
    }

    .selected-desc {
      font-size: 14px;
      color: #6c5b4c;
      line-height: 1.6;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .progress-count {
      font-size: 16px;
      font-weight: 700;
      color: var(--red);
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #eadfce;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--red);
      transition: width 0.2s ease;
    }

    .problem-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #efe5d6;
      color: #6b5647;
      font-size: 13px;
      font-weight: 700;
    }

    .pill.done {
      background: rgba(31, 122, 69, 0.12);
      color: var(--green);
    }

    .problem-title {
      margin: 0 0 10px;
      color: var(--red);
      font-size: 28px;
      line-height: 1.2;
    }

    .problem-place {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }

    .problem-text,
    .hint-text,
    .result-text {
      font-size: 15px;
      line-height: 1.7;
      color: #5f4f43;
      white-space: pre-line;
    }

    .field-label {
      display: block;
      margin: 18px 0 8px;
      font-size: 14px;
      font-weight: 700;
      color: #6b5647;
    }

    .answer-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d9cdbd;
      background: rgba(255,255,255,0.9);
      font-size: 15px;
      outline: none;
    }

    .answer-input:focus {
      border-color: #bb8f87;
      box-shadow: 0 0 0 3px rgba(159, 29, 22, 0.08);
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .result-text {
      margin-top: 14px;
      font-weight: 700;
    }

    .result-text.success {
      color: var(--green);
    }

    .result-text.error {
      color: var(--red);
    }

    .legend {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .legend-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .legend-code {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(70,70,70,0.72);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .legend-item.done .legend-code {
      background: var(--green);
    }

    .bottom-note {
      width: min(1100px, 100%);
      margin: 18px auto 0;
      text-align: center;
      color: #7b6858;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .layout-grid {
        grid-template-columns: 1fr;
      }

      .legend {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .node {
        width: 30px;
        height: 30px;
        font-size: 13px;
      }
    }

    @media (max-width: 560px) {
      .main {
        padding: 20px 10px 40px;
      }

      .legend {
        grid-template-columns: 1fr;
      }

      .node {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }

      .selected-code {
        font-size: 30px;
      }

      .problem-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="introScreen" class="intro">
      <div class="intro-card">
        <h1 class="intro-title">GRUA CAMPUS MAP</h1>
        <p class="intro-sub">
          지도를 기반으로 각 구역을 탐색합니다.<br />
          이번 단계에서는 노드별 설명과 문제, 정답 입력 기능을 연결합니다.
        </p>
        <button id="startBtn" class="start-btn">캠퍼스 입장</button>
      </div>
    </section>

    <main id="mainScreen" class="main hidden">
      <div class="main-inner">
        <h1 class="page-title">GRUA CAMPUS MAP</h1>

        <section class="map-panel">
          <div class="map-wrap">
            <img
              class="map-image"
              src="assets/campus-map.png"
              alt="GRUA 캠퍼스 지도"
            />
            <div id="nodeLayer" class="node-layer"></div>
          </div>
        </section>

        <section class="layout-grid">
          <div class="left-stack">
            <article class="card">
              <h2>선택한 구역</h2>
              <div id="selectedBox" class="selected-box"></div>
            </article>

            <article class="card">
              <h2>진행 현황</h2>
              <div class="progress-top">
                <div class="progress-count">
                  완료 <span id="doneCount">0</span> / <span id="totalCount">0</span>
                </div>
              </div>
              <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
              </div>
            </article>

            <article class="card">
              <h2>캠퍼스 구역 목록</h2>
              <div id="legend" class="legend"></div>
            </article>
          </div>

          <article class="card">
            <h2>문제 패널</h2>
            <div id="problemPanel"></div>
          </article>
        </section>

        <p class="bottom-note">
          현재 버전은 문제/정답 입력 연결용 로컬 테스트본입니다.
          다음 단계에서 Firestore와 퍼즐 해금 로직을 연결합니다.
        </p>
      </div>
    </main>
  </div>

      {

      {

        description: "분석실 구역입니다.",

      {

      },
      {

        description: "전망이 좋은 라운지 공간입니다.",
        question: "스카이뷰 라운지 코드 알파벳은?",
        hint: "S 다음입니다.",
        answer: "T"
      },
      {
        code: "U", name: "다리", x: 34.2, y: 48.0,
        description: "두 공간을 연결하는 다리입니다.",
        question: "다리의 코드 알파벳은?",

        answer: "U"
      },
      {
        code: "V", name: "추모관", x: 39.2, y: 58.1,
        description: "기억과 기념의 의미를 가진 공간입니다.",
        question: "추모관의 코드 알파벳은?",
        hint: "U 다음입니다.",
        answer: "V"
      },
      {
        code: "W", name: "기숙사", x: 31.8, y: 20.6,
        description: "캠퍼스 생활의 거점이 되는 기숙사입니다.",
        question: "기숙사의 코드 알파벳은?",
        hint: "마지막 코드입니다.",
        answer: "W"
      }
    ];

    const introScreen = document.getElementById("introScreen");
    const mainScreen = document.getElementById("mainScreen");
    const startBtn = document.getElementById("startBtn");
    const nodeLayer = document.getElementById("nodeLayer");
    const selectedBox = document.getElementById("selectedBox");
    const legend = document.getElementById("legend");
    const doneCountEl = document.getElementById("doneCount");
    const totalCountEl = document.getElementById("totalCount");
    const progressFill = document.getElementById("progressFill");
    const problemPanel = document.getElementById("problemPanel");

    let selectedCode = "A";
    const completed = new Set();

    startBtn.addEventListener("click", () => {
      introScreen.classList.add("hidden");
      mainScreen.classList.remove("hidden");
      renderAll();
    });

    function renderAll() {
      renderNodes();
      renderSelected();
      renderLegend();
      renderProgress();
      renderProblemPanel();
    }

    function getSelectedNode() {
      return NODE_DATA.find(item => item.code === selectedCode) || null;
    }

    function renderNodes() {
      nodeLayer.innerHTML = "";

      NODE_DATA.forEach((node) => {
        const btn = document.createElement("button");
        btn.className = "node";
        btn.type = "button";
        btn.textContent = node.code;
        btn.style.left = node.x + "%";
        btn.style.top = node.y + "%";
        btn.setAttribute("aria-label", `${node.code} ${node.name}`);

        if (selectedCode === node.code) btn.classList.add("active");
        if (completed.has(node.code)) btn.classList.add("done");

        btn.addEventListener("click", () => {
          selectedCode = node.code;
          renderNodes();
          renderSelected();
          renderProblemPanel();
        });

        nodeLayer.appendChild(btn);
      });
    }

    function renderSelected() {
      const node = getSelectedNode();

      if (!node) {
        selectedBox.innerHTML = `
          <div class="selected-code">-</div>
          <div class="selected-name">선택된 노드가 없습니다.</div>
          <div class="selected-desc">지도 위 노드를 눌러 구역을 선택하세요.</div>
        `;
        return;
      }

      const isDone = completed.has(node.code);

      selectedBox.innerHTML = `
        <div class="selected-code">${node.code}</div>
        <div class="selected-name">${node.name}</div>
        <div class="selected-desc">
          ${node.description}<br />
          상태: <strong>${isDone ? "완료" : "미완료"}</strong>
        </div>
      `;
    }

    function renderLegend() {
      legend.innerHTML = "";

      NODE_DATA.forEach((node) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        if (completed.has(node.code)) item.classList.add("done");

        item.innerHTML = `
          <span class="legend-code">${node.code}</span>
          <span>${node.name}</span>
        `;

        legend.appendChild(item);
      });
    }

    function renderProgress() {
      const total = NODE_DATA.length;
      const done = completed.size;
      const percent = total === 0 ? 0 : (done / total) * 100;

      totalCountEl.textContent = total;
      doneCountEl.textContent = done;
      progressFill.style.width = percent + "%";
    }

    function renderProblemPanel() {
      const node = getSelectedNode();

      if (!node) {
        problemPanel.innerHTML = `
          <div class="problem-text">먼저 노드를 선택하세요.</div>
        `;
        return;
      }

      const isDone = completed.has(node.code);

      problemPanel.innerHTML = `
        <div class="problem-meta">
          <span class="pill">노드 ${node.code}</span>
          <span class="pill">${node.name}</span>
          <span class="pill ${isDone ? "done" : ""}">${isDone ? "완료됨" : "진행 중"}</span>
        </div>

        <h3 class="problem-title">${node.code}</h3>
        <div class="problem-place">${node.name}</div>

        <div class="problem-text">${node.description}</div>

        <label class="field-label">문제</label>
        <div class="problem-text">${node.question}</div>

        <label class="field-label">정답 입력</label>
        <input
          id="answerInput"
          class="answer-input"
          type="text"
          placeholder="정답을 입력하세요"
          autocomplete="off"
          ${isDone ? "disabled" : ""}
        />

        <div class="action-row">
          <button id="submitBtn" class="submit-btn" ${isDone ? "disabled" : ""}>정답 제출</button>
          <button id="hintBtn" class="hint-btn" type="button">힌트 보기</button>
        </div>

        <div id="hintArea" class="hint-text hidden"></div>
        <div id="resultArea" class="result-text"></div>
      `;

      const answerInput = document.getElementById("answerInput");
      const submitBtn = document.getElementById("submitBtn");
      const hintBtn = document.getElementById("hintBtn");
      const hintArea = document.getElementById("hintArea");
      const resultArea = document.getElementById("resultArea");

      hintBtn.addEventListener("click", () => {
        hintArea.classList.remove("hidden");
        hintArea.textContent = `힌트: ${node.hint}`;
      });

      const submitAnswer = () => {
        const userAnswer = (answerInput.value || "").trim().toUpperCase();
        const correctAnswer = String(node.answer).trim().toUpperCase();

        if (!userAnswer) {
          resultArea.className = "result-text error";
          resultArea.textContent = "정답을 입력해 주세요.";
          return;
        }

        if (userAnswer === correctAnswer) {
          completed.add(node.code);
          resultArea.className = "result-text success";
          resultArea.textContent = "정답입니다. 해당 노드가 완료 처리되었습니다.";
          renderNodes();
          renderSelected();
          renderLegend();
          renderProgress();
          setTimeout(() => {
            renderProblemPanel();
          }, 250);
        } else {
          resultArea.className = "result-text error";
          resultArea.textContent = "오답입니다. 다시 시도해 주세요.";
        }
      };

      submitBtn.addEventListener("click", submitAnswer);

      answerInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          submitAnswer();
        }
      });
    }
  </script>
</body>
</html>
