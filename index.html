<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTINUUM ACCESS</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Courier New', monospace;
  }

  body {
    background: black;
    color: #00ffcc;
    overflow: hidden;
  }

  /* 🎬 영상 배경 */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }

  /* 어두운 오버레이 */
  .overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
  }

  /* 중앙 UI */
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .title {
    font-size: 18px;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  .btn {
    border: 1px solid #00ffcc;
    padding: 12px 24px;
    cursor: pointer;
    display: inline-block;
    transition: 0.3s;
  }

  .btn:hover {
    background: #00ffcc;
    color: black;
  }

  /* 로그 텍스트 */
  .log {
    position: absolute;
    bottom: 40px;
    left: 40px;
    font-size: 12px;
    opacity: 0.8;
  }

</style>
</head>

<body>

<!-- 🎬 영상 -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🎮 UI -->
<div class="center" id="mainUI">
  <div class="title">CONTINUUM AUTHORITY</div>
  <div class="btn" onclick="enterSystem()">ACCESS</div>
</div>

<div class="log" id="log"></div>

<script>
function enterSystem() {
  const log = document.getElementById("log");
  const mainUI = document.getElementById("mainUI");

  mainUI.style.display = "none";

  let messages = [
    "ACCESS REQUEST SENT...",
    "AUTHENTICATION SUCCESS...",
    "LOADING FIELD DATA...",
    "COUNCIL LINK ESTABLISHED...",
    "ENTERING SYSTEM..."
  ];

  let i = 0;

  function showLog() {
    if (i < messages.length) {
      log.innerHTML += messages[i] + "<br>";
      i++;
      setTimeout(showLog, 800);
    } else {
      setTimeout(() => {
        window.location.href = "map.html"; // 👉 다음 페이지
      }, 1000);
    }
  }

  showLog();
}
</script>

</body>
</html>
