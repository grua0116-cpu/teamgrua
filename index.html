<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GRUA ACCESS</title>

<style>
body {margin:0;background:black;color:#9efcff;font-family:monospace;overflow:hidden;}
video {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.25;}
.container {position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.title {font-size:14px;letter-spacing:3px;margin-bottom:20px;opacity:0.7;}
.text {max-width:700px;line-height:1.8;font-size:14px;white-space:pre-line;min-height:180px;}
button {margin-top:40px;padding:10px 20px;background:transparent;border:1px solid #9efcff;color:#9efcff;cursor:pointer;}
button:hover {background:#9efcff;color:black;}
</style>
</head>

<body>

<div class="container">
  <div class="title">CONTINUUM AUTHORITY // ACCESS LOG</div>
  <div class="text" id="typing"></div>
  <button onclick="location.href='type.html'">기록 열람 계속</button>
</div>

<script>
const text = `기록 열람이 승인되었습니다.

본 기록은 '사랑'이라는개념형 이상 개체에 대한 관측자료입니다.
해당 개체는 특정조건에서 발생하며,
현재 지속 및 유지 여부에 대한 논쟁이 진행 중입니다.

귀하는 이 구조를 이해하고, 그 유지여부를 판단할 권한을 부여받았습니다.`;

let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerText += text[i++];
    setTimeout(typing,90);
  }
}
typing();
</script>

</body>
</html>
