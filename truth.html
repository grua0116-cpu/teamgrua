<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRUTH</title>

<style>
body{
  margin:0;
  background:#040712;
  color:#dffcff;
  font-family:'Pretendard',sans-serif;
  overflow-x:hidden;
}

.wrap{
  width:900px;
  margin:0 auto;
  padding:80px 0;
}

.hero{
  text-align:center;
  margin-bottom:80px;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  color:#9fc2cf;
}

.section{
  margin-bottom:80px;
}

.section h2{
  margin-bottom:20px;
}

.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:all 0.8s;
}

.reveal.show{
  opacity:1;
  transform:translateY(0);
}

textarea{
  width:100%;
  height:120px;
  margin-top:20px;
  background:#071021;
  border:1px solid #6ff6ff;
  color:white;
  padding:15px;
}

button{
  margin-top:20px;
  padding:14px 24px;
  background:#6ff6ff;
  border:none;
  cursor:pointer;
}

.fade{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:opacity 1s;
}

.fade.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="hero">
    <h1>Continuum Authority</h1>
    <p>Truth Archive</p>
  </div>

  <div class="section reveal">
    <h2>Declaration</h2>
    <p>
      우리는 사랑을 통제하지 않는다.<br>
      우리는 사랑을 제거하지 않는다.<br><br>
      우리는 단지 그것이 발생하는 조건을 기록한다.
    </p>
  </div>

  <div class="section reveal">
    <h2>Organization</h2>
    <p>
      GRUA는 독립 연구 조직이다.<br>
      우리는 감정의 구조를 분석하고,<br>
      그 지속 가능성을 관측한다.
    </p>
  </div>

  <div class="section reveal">
    <h2>Final Consent</h2>

    <p>당신은 이 기록에 동의합니까?</p>

    <textarea id="input"></textarea>

    <button onclick="submit()">SUBMIT CONSENT</button>
  </div>

</div>

<div class="fade" id="fade"></div>

<script>
const reveals = document.querySelectorAll('.reveal');

function revealOnScroll(){
  reveals.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', revealOnScroll);
revealOnScroll();

function wait(ms){
  return new Promise(resolve=>setTimeout(resolve,ms));
}

async function submit(){
  const val = document.getElementById('input').value;

  localStorage.setItem('gruaConsent', val);

  const fadeEl = document.getElementById('fade');

  await wait(500);
  fadeEl.classList.add('show');

  // ✅ 추가된 유일한 연결
  setTimeout(()=>{
    location.href = "archive.html";
  },900);
}
</script>

</body>
</html>
