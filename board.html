<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRUA 대나무숲</title>
  <style>
    body { margin:0; background:#0b0b0b; color:#e6e6e6; font-family:sans-serif; }
    .wrap { max-width:720px; margin:0 auto; padding:36px 18px; }
    h1 { font-size:24px; margin-bottom:6px; }
    .desc,.meta { color:#888; font-size:14px; }
    .post { border:1px solid #333; background:#111; padding:18px; margin-bottom:18px; }
    .content { white-space:pre-wrap; line-height:1.7; margin-top:10px; }
    .comments { border-top:1px solid #222; margin-top:16px; padding-top:12px; }
    .comment { font-size:14px; color:#ccc; border-bottom:1px solid #1d1d1d; padding:8px 0; }
    .empty { color:#777; text-align:center; padding:40px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>GRUA 대나무숲</h1>
    <div class="desc">지금 ■■■에게 무슨 일이 일어나고 있나요?</div>
    <br />
    <div id="posts"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, getDocs, query, orderBy, limit
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBR7ogWqmI1osy45YU7YI_hFcIfjTlk7s4",
      authDomain: "teamgrua-2d9b9.firebaseapp.com",
      projectId: "teamgrua-2d9b9",
      storageBucket: "teamgrua-2d9b9.firebasestorage.app",
      messagingSenderId: "195186066793",
      appId: "1:195186066793:web:14eb2976f5f1b7304c69f8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 새 게시판 이름
    const BOARD_COLLECTION = "posts2027";

    const postsEl = document.getElementById("posts");

    async function loadPosts() {
      postsEl.innerHTML = "";

      const q = query(
        collection(db, BOARD_COLLECTION),
        orderBy("createdAt", "desc"),
        limit(50)
      );

      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        postsEl.innerHTML = `<div class="empty">아직 남겨진 기억이 없습니다.</div>`;
        return;
      }

      for (const docSnap of snapshot.docs) {
        const post = docSnap.data();
        const postId = docSnap.id;

        const date = post.createdAt?.toDate
          ? post.createdAt.toDate().toLocaleString("ko-KR")
          : "";

        const postDiv = document.createElement("div");
        postDiv.className = "post";

        postDiv.innerHTML = `
          <div class="meta">익명 · ${date}</div>
          <div class="content">${escapeHtml(post.content)}</div>
          <div class="comments" id="comments-${postId}">
            <div class="meta">댓글</div>
          </div>
        `;

        postsEl.appendChild(postDiv);
        await loadComments(postId);
      }
    }

    async function loadComments(postId) {
      const commentsEl = document.getElementById(`comments-${postId}`);

      const q = query(
        collection(db, BOARD_COLLECTION, postId, "comments"),
        orderBy("createdAt", "asc"),
        limit(30)
      );

      const snapshot = await getDocs(q);
      commentsEl.innerHTML = `<div class="meta">댓글 ${snapshot.size}</div>`;

      snapshot.forEach((docSnap) => {
        const comment = docSnap.data();
        const div = document.createElement("div");
        div.className = "comment";
        div.textContent = `익명: ${comment.content}`;
        commentsEl.appendChild(div);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadPosts();
  </script>
</body>
</html>
