<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRUA 대나무숲</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #e6e6e6;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 36px 18px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .desc {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .post {
      border: 1px solid #333;
      background: #111;
      padding: 18px;
      margin-bottom: 18px;
    }

    .meta {
      font-size: 12px;
      color: #777;
      margin-bottom: 10px;
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .comments {
      border-top: 1px solid #222;
      padding-top: 12px;
      margin-top: 12px;
    }

    .comment {
      font-size: 14px;
      color: #ccc;
      border-bottom: 1px solid #1d1d1d;
      padding: 8px 0;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>GRUA 대나무숲</h1>
    <div class="desc">지금 ■■■에게 무슨 일이 일어나고 있나요?</div>

    <div class="post">
      <div class="meta">익명 </div>
      <div class="content">

도와줘 </div>

      <div class="comments">
        <div class="meta">댓글 1 </div>
      </div>
    </div>
  </div>
</body>
</html>
